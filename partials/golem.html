
<!-- scroll companion -->
<div class="buddy" id="buddy" aria-hidden="true">
  <div class="buddy-bubble" id="buddyBubble">hey, I'll show you around</div>
  <svg class="buddy-bot" viewBox="0 0 92 124" width="78" height="105">
    <defs>
      <linearGradient id="eyeG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFE680"/><stop offset="1" stop-color="#FFB838"/></linearGradient>
    </defs>
    <!-- legs (animate while walking) -->
    <g class="buddy-leg-l"><rect x="25" y="92" width="18" height="20" rx="1" fill="#1E6B45" stroke="#08321E" stroke-width="3"/><rect x="25" y="92" width="6" height="20" fill="#0E4A2E"/><rect x="22" y="108" width="22" height="10" rx="1" fill="#0E4A2E" stroke="#08321E" stroke-width="3"/></g>
    <g class="buddy-leg-r"><rect x="49" y="92" width="18" height="20" rx="1" fill="#185A39" stroke="#08321E" stroke-width="3"/><rect x="60" y="92" width="7" height="20" fill="#0B4226"/><rect x="48" y="108" width="22" height="10" rx="1" fill="#0B4226" stroke="#08321E" stroke-width="3"/></g>
    <!-- arms: the shoulders sit just into the body, below the head/body divide -->
    <g class="buddy-arm-l"><rect x="4" y="54" width="11" height="22" rx="1.5" fill="#2E8C5E" stroke="#08321E" stroke-width="2.8"/><rect x="4" y="66" width="11" height="10" fill="#176243"/><rect x="6" y="56" width="4" height="9" fill="#4FBF8B"/><rect x="1" y="72" width="14" height="11" rx="1.5" fill="#1E6B45" stroke="#08321E" stroke-width="2.8"/></g>
    <g class="buddy-arm-r"><rect x="77" y="54" width="11" height="22" rx="1.5" fill="#206C46" stroke="#08321E" stroke-width="2.8"/><rect x="77" y="66" width="11" height="10" fill="#124E33"/><rect x="77" y="72" width="14" height="11" rx="1.5" fill="#185A39" stroke="#08321E" stroke-width="2.8"/></g>
    <!-- body (wide block, plain metal), grouped so it can fly apart -->
    <g class="buddy-body">
    <rect x="14" y="50" width="64" height="42" rx="3" fill="#2E8C5E" stroke="#08321E" stroke-width="3.4"/>
    <rect x="64" y="53" width="11" height="36" fill="#176243"/>
    <rect x="17" y="84" width="58" height="5" fill="#176243" opacity=".7"/>
    <rect x="17" y="53" width="9" height="32" fill="#4FBF8B" opacity=".45"/>
    <rect x="44" y="53" width="2.4" height="36" fill="#0B4226" opacity=".42"/>
    <rect x="20" y="55" width="3.6" height="3.6" fill="#08321E"/><rect x="68.4" y="55" width="3.6" height="3.6" fill="#08321E"/>
    <rect x="20" y="83" width="3.6" height="3.6" fill="#08321E"/><rect x="68.4" y="83" width="3.6" height="3.6" fill="#08321E"/>
    <circle cx="30" cy="68" r="3.6" fill="#176243"/><circle cx="30" cy="67" r="1.5" fill="#5FD89B"/>
    <circle cx="62" cy="68" r="3.6" fill="#176243"/><circle cx="62" cy="67" r="1.5" fill="#5FD89B"/>
    <circle cx="46" cy="74" r="3.2" fill="#176243"/><circle cx="46" cy="73.1" r="1.3" fill="#5FD89B"/>
    <rect x="24" y="60" width="8" height="5" rx="1.5" fill="#8FE3C0" opacity=".4"/>
    <rect x="60" y="78" width="6" height="4" rx="1" fill="#8FE3C0" opacity=".35"/>
    </g>
    <!-- head (same width as the body, clear gap above) with the antenna + large yellow eyes -->
    <g class="buddy-head">
      <rect x="44" y="9" width="4" height="13" rx="1" fill="#1E6B45" stroke="#08321E" stroke-width="2"/>
      <rect x="41" y="1" width="10" height="10" rx="1.5" fill="#5FD89B" stroke="#08321E" stroke-width="2"/>
      <rect x="43" y="3" width="3.5" height="3.5" fill="#A8F0CC"/>
      <rect x="14" y="20" width="64" height="26" rx="3" fill="#2E8C5E" stroke="#08321E" stroke-width="3.4"/>
      <rect x="17" y="23" width="58" height="4" fill="#4FBF8B" opacity=".5"/>
      <rect x="64" y="23" width="11" height="20" fill="#176243"/>
      <rect class="buddy-eye" x="25" y="26" width="14" height="14" rx="2.5" fill="url(#eyeG)" stroke="#08321E" stroke-width="2"/>
      <rect class="buddy-eye" x="53" y="26" width="14" height="14" rx="2.5" fill="url(#eyeG)" stroke="#08321E" stroke-width="2"/>
    </g>
  </svg>
</div>
